<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#7c5cbf');
  grad.addColorStop(1, '#5b3fa0');
  ctx.fillStyle = grad;

  // Rounded rect
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Shekel symbol ₪
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.52}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('₪', s / 2, s / 2 + s * 0.03);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download
function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

setTimeout(() => {
  dl('c192', 'icon-192.png');
  setTimeout(() => dl('c512', 'icon-512.png'), 500);
}, 100);
</script>
</body>
</html>
